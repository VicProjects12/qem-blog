<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post — Blog</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Quill editor styles -->
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet"
    />
    <style>
      .ql-container {
        background: var(--bg-card);
        border: 1px solid var(--border) !important;
        border-radius: 0 0 8px 8px !important;
        color: var(--text);
        font-size: 1rem;
        min-height: 280px;
      }
      .ql-toolbar {
        background: var(--bg-input);
        border: 1px solid var(--border) !important;
        border-radius: 8px 8px 0 0 !important;
      }
      .ql-toolbar .ql-stroke {
        stroke: var(--text-sub);
      }
      .ql-toolbar .ql-fill {
        fill: var(--text-sub);
      }
      .ql-toolbar .ql-picker-label {
        color: var(--text-sub);
      }
      .ql-toolbar button:hover .ql-stroke {
        stroke: var(--text);
      }
      .ql-toolbar button:hover .ql-fill {
        fill: var(--text);
      }
      .ql-editor.ql-blank::before {
        color: var(--text-muted);
        font-style: normal;
      }
      .ql-editor {
        min-height: 280px;
        color: var(--text);
      }
      .ql-editor pre {
        background: #1e293b;
        border-radius: 6px;
        color: #e2e8f0;
        padding: 12px;
      }
      .ql-picker-options {
        background: var(--bg-card);
        border: 1px solid var(--border);
      }
      .ql-picker-item {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a class="logo" href="index.html">
        <img
          src="logo.png"
          alt="QEM Creatives"
          style="height: 36px; width: auto"
        />
        <span>QEM Creatives</span>
      </a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <button id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
        <button class="btn-secondary" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="glass-container" style="max-width: 720px">
      <h1 id="pageTitle">Create Post</h1>
      <p class="subtitle" id="pageSubtitle">Share your thoughts</p>

      <div id="errorMsg" class="error-msg hidden"></div>
      <div id="successMsg" class="success-msg hidden"></div>

      <div class="form-group">
        <input type="text" id="title" placeholder="Post title" />
      </div>
      <div class="form-group">
        <select id="category">
          <option value="general">General</option>
          <option value="tutorial">Tutorial</option>
          <option value="news">News</option>
          <option value="opinion">Opinion</option>
        </select>
      </div>

      <!-- Quill editor container -->
      <div class="form-group">
        <div id="editor"></div>
      </div>

      <button id="submitBtn" class="btn-primary" style="margin-top: 16px">
        Publish Post
      </button>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <!-- Quill editor script -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="js/create.js"></script>
  </body>
</html>
