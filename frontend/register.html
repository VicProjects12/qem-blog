<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — QEM Creatives</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a class="logo" href="index.html">
        <img
          src="logo.png"
          alt="QEM Creatives"
          style="height: 36px; width: auto"
        />
        <span>QEM Creatives</span>
      </a>
      <div class="nav-links">
        <a href="login.html">Login</a>
        <button id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
      </div>
    </nav>

    <div class="glass-container">
      <h1>Create Account</h1>
      <p class="subtitle">Join QEM Creatives today</p>

      <div id="errorMsg" class="error-msg hidden"></div>

      <div class="form-group">
        <input
          type="text"
          id="name"
          placeholder="Full name"
          autocomplete="name"
        />
      </div>
      <div class="form-group">
        <input
          type="email"
          id="email"
          placeholder="Email address"
          autocomplete="email"
        />
      </div>
      <div class="form-group">
        <input
          type="password"
          id="password"
          placeholder="Password"
          autocomplete="new-password"
        />
      </div>

      <button id="registerBtn" class="btn-primary">Create Account</button>

      <p class="switch-link">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
